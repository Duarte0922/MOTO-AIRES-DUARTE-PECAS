<!DOCTYPE html>
<html lang="pt-BR">
<head>   
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTO AIRES & DUARTE PEÇAS — Catálogo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0D0D0D;
            --surface: #161616;
            --card: #1A1A1A;
            --border: #2A2A2A;
            --orange: #FF5500;
            --orange-dim: #CC4400;
            --text: #F0F0F0;
            --muted: #777;
            --silver: #A0A0A0;
            --danger: #FF3333;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }

        /* ─── HERO ─── */
        .hero { position: relative; overflow: hidden; padding: 60px 20px 40px; border-bottom: 1px solid var(--border); text-align: center; }
        .hero-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; color: var(--orange); margin-bottom: 14px; }
        .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(44px, 8vw, 110px); line-height: 0.95; letter-spacing: 2px; }
        .hero-title span { color: var(--orange); }
        .hero-subtitle { font-family: 'Bebas Neue', sans-serif; font-size: clamp(24px, 4vw, 36px); letter-spacing: 2px; color: var(--silver); margin-top: 15px; line-height: 1.2; padding: 0 10px; }

        /* ─── HERO SLIDER SUPERIOR (MENU EM CARROSSEL) ─── */
        .hero-slider { display: flex; padding: 15px 20px; gap: 12px; overflow-x: auto; background: #111; border-bottom: 1px solid var(--border); scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .hero-slider::-webkit-scrollbar { display: none; }
        .slide { min-width: 160px; height: 100px; flex: 1; position: relative; border-radius: 10px; overflow: hidden; cursor: pointer; border: 1px solid var(--border); transition: 0.2s; flex-shrink: 0; }
        .slide:hover { border-color: var(--orange); transform: scale(1.02); }
        .slide-caption { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; background: rgba(0,0,0,0.5); text-shadow: 2px 2px 4px rgba(0,0,0,0.9); }

        /* ─── CARROSSEL BANNER DE DESTAQUES ─── */
        .carousel-section { position: relative; overflow: hidden; height: clamp(220px, 40vh, 350px); background: #111; border-bottom: 1px solid var(--border); }
        .carousel-track { display: flex; height: 100%; transition: transform 0.5s cubic-bezier(.77,0,.175,1); }
        .carousel-slide { min-width: 100%; height: 100%; position: relative; flex-shrink: 0; cursor: pointer; }
        .carousel-slide img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .carousel-slide-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.95)); }
        .carousel-slide-name { font-family: 'Bebas Neue', sans-serif; font-size: clamp(24px, 5vw, 42px); letter-spacing: 1px; }
        .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); border: 1px solid var(--border); color: white; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; z-index: 10; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .carousel-btn.prev { left: 10px; }
        .carousel-btn.next { right: 10px; }

        /* ─── ADMIN PANEL (PAINEL DE CADASTRO) ─── */
        .admin-panel { margin: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .admin-title { font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--orange); margin-bottom: 16px; }
        .admin-fields { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; align-items: flex-end; }
        .admin-field-group { display: flex; flex-direction: column; gap: 5px; }
        .admin-field-group.full-width { grid-column: 1 / -1; }
        .admin-field-group label { font-size: 11px; color: var(--muted); text-transform: uppercase; }
        .admin-fields input, .admin-fields select { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 11px 14px; border-radius: 8px; outline: none; width: 100%; font-size: 14px; }
        .upload-btn { background: var(--orange); color: white; border: none; padding: 11px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; height: 44px; grid-column: 1 / -1; width: 100%; text-align: center; font-size: 14px; }
        #fileInput { display: none; }

        /* GERENCIADOR DE CAPA NO PAINEL */
        .preview-management { width: 100%; margin-top: 15px; display: none; background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .preview-management p { font-size: 12px; color: var(--silver); margin-bottom: 10px; }
        .preview-thumbs-container { display: flex; gap: 10px; flex-wrap: wrap; }
        .thumb-manage-item { width: 70px; height: 55px; position: relative; border-radius: 6px; overflow: hidden; cursor: pointer; border: 2px solid transparent; }
        .thumb-manage-item img { width: 100%; height: 100%; object-fit: cover; }
        .thumb-manage-item.is-cover { border-color: var(--orange); }
        .thumb-manage-item.is-cover::after { content: "CAPA"; position: absolute; bottom: 0; left: 0; right: 0; background: var(--orange); color: white; font-size: 8px; font-weight: bold; text-align: center; padding: 1px 0; }

        /* ─── TABS ABAIXO DO PAINEL ─── */
        .tabs-wrap { padding: 15px 20px 0; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .tabs-wrap::-webkit-scrollbar { display: none; }
        .tab-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 8px 20px; border-radius: 40px; cursor: pointer; font-weight: 500; transition: 0.2s; flex-shrink: 0; font-size: 14px; }
        .tab-btn.active { background: var(--orange); border-color: var(--orange); color: white; }

        /* ─── GALLERY ─── */
        .gallery-wrap { padding: 20px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }

        /* ─── PRODUCT CARD ─── */
        .product-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.2s; position: relative; }
        .product-card:hover { transform: translateY(-3px); border-color: var(--orange); }
        .card-img-wrap { height: 200px; position: relative; background: #000; }
        .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .card-img-count { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; font-size: 11px; padding: 4px 8px; border-radius: 4px; }
        
        /* BOTÃO REMOVER */
        .delete-btn { position: absolute; top: 10px; right: 10px; background: rgba(0, 0, 0, 0.75); border: 1px solid rgba(255,255,255,0.1); color: var(--danger); width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 50; transition: 0.2s; font-size: 16px; }
        .delete-btn:hover { background: var(--danger); color: white; }

        .card-body { padding: 15px; }
        .card-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
        .card-specs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
        .spec-pill { background: var(--surface); border: 1px solid var(--border); padding: 4px 8px; border-radius: 6px; font-size: 11px; color: var(--silver); }
        .card-price { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--orange); }

        /* ─── MODAL CONTÊINER DE FOTOS ─── */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); padding: 10px; }
        .modal-overlay.open { display: flex; }
        .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 800px; max-height: 95vh; overflow-y: auto; position: relative; }
        .modal-carousel { position: relative; background: #000; height: clamp(250px, 50vh, 450px); }
        .modal-track { display: flex; height: 100%; transition: 0.4s ease; }
        .modal-slide { min-width: 100%; height: 100%; }
        .modal-slide img { width: 100%; height: 100%; object-fit: contain; }
        .modal-info { padding: 20px; }
        .modal-close { position: absolute; top: 15px; right: 15px; background: white; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; z-index: 100; font-weight: bold; color: black; display: flex; align-items: center; justify-content: center; }

        /* Responsividade para Telas Muito Pequenas */
        @media (max-width: 480px) {
            .hero-slider { padding: 10px; gap: 8px; }
            .slide { min-width: 130px; height: 85px; }
            .admin-fields { grid-template-columns: 1fr 1fr; }
            .admin-field-group.mobile-full { grid-column: 1 / -1; }
            .gallery { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header class="hero" style="
    background-image: linear-gradient(rgba(11, 11, 11, 0.4), rgba(13, 13, 13, 0.85)), url('img/augusta.jpg');
    background-size: cover;
    background-position: center center;
">
    <div class="hero-eyebrow">⚡ Catálogo Interativo</div>
    <h1 class="hero-title">MOTO AIRES E <span>DUARTE PEÇAS</span></h1>
    <h3 class="hero-subtitle">
        AS PEÇAS QUE VCS NÃO ENCONTRAM NEM NA CHINA.....VCS AGORA ESTÃO NO LUGAR CERTO!!!
    </h3>
</header>

<section class="hero-slider">
    <div class="slide" onclick="abrirCategoria('motos')">
        <img id="img-capa-motos" src="img/augusta.jpg" alt="Motos" style="width: 100%; height: 100%; object-fit: cover; opacity: 0.5;">
        <div class="slide-caption">MOTOS</div>
    </div>

    <div class="slide" onclick="abrirCategoria('quadriciclos')">
        <img id="img-capa-quadriciclos" src="img/augusta.jpg" alt="Quadriciclos" style="width: 100%; height: 100%; object-fit: cover; opacity: 0.5;">
        <div class="slide-caption">QUADRICICLOS</div>
    </div>

    <div class="slide" onclick="abrirCategoria('pecas')">
        <img id="img-capa-pecas" src="img/augusta.jpg" alt="Peças" style="width: 100%; height: 100%; object-fit: cover; opacity: 0.5;">
        <div class="slide-caption">PEÇAS</div>
    </div>

    <div class="slide" onclick="abrirCategoria('acessorios')">
        <img id="img-capa-acessorios" src="img/augusta.jpg" alt="Acessórios" style="width: 100%; height: 100%; object-fit: cover; opacity: 0.5;">
        <div class="slide-caption">ACESSÓRIOS</div>
    </div>
</section>

<div class="carousel-section">
    <div id="carouselTrack" class="carousel-track"></div>
    <button class="carousel-btn prev" onclick="moverCarrossel(-1)">&#8249;</button>
    <button class="carousel-btn next" onclick="moverCarrossel(1)">&#8250;</button>
</div>

<section class="admin-panel">
    <div class="admin-title">▸ Adicionar Novo Item</div>
    <div class="admin-fields">
        <div class="admin-field-group full-width">
            <label>Nome da Moto / Item</label>
            <input type="text" id="prodName" placeholder="Ex: Honda CB 500X">
        </div>
        <div class="admin-field-group mobile-full">
            <label>Categoria</label>
            <select id="prodCategory">
                <option value="motos">Motos</option>
                <option value="pecas">Peças</option>
                <option value="quadriciclos">Quadriciclos</option>
                <option value="acessorios">Acessórios</option>
            </select>
        </div>
        <div class="admin-field-group">
            <label>Ano</label>
            <input type="text" id="prodAno" placeholder="2023">
        </div>
        <div class="admin-field-group">
            <label>Modelo</label>
            <input type="text" id="prodModelo" placeholder="ABS">
        </div>
        <div class="admin-field-group">
            <label>KM</label>
            <input type="text" id="prodKm" placeholder="5.000">
        </div>
        <div class="admin-field-group mobile-full">
            <label>Preço (R$)</label>
            <input type="text" id="prodPreco" placeholder="45.000">
        </div>
        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">Selecionar Fotos</button>
        <input type="file" id="fileInput" accept="image/*" multiple onchange="carregarFotosPainel(this.files)">
    </div>

    <div class="preview-management" id="previewManagement">
        <p>💡 Clique em uma das imagens abaixo para defini-la como a <strong>Foto de Capa</strong> principal:</p>
        <div class="preview-thumbs-container" id="previewThumbsContainer"></div>
        <button class="upload-btn" style="margin-top: 15px; height: 38px; padding: 0 15px; background: #1DB954;" onclick="salvarProduto()">Concluir e Salvar Item</button>
    </div>
</section>

<nav class="tabs-wrap">
    <button id="tab-todos" class="tab-btn active" onclick="filterCategory('todos', this)">Todos</button>
    <button id="tab-motos" class="tab-btn" onclick="filterCategory('motos', this)">Motos</button>
    <button id="tab-pecas" class="tab-btn" onclick="filterCategory('pecas', this)">Peças</button>
    <button id="tab-quadriciclos" class="tab-btn" onclick="filterCategory('quadriciclos', this)">Quadriciclos</button>
    <button id="tab-acessorios" class="tab-btn" onclick="filterCategory('acessorios', this)">Acessórios</button>
</nav>

<main class="gallery-wrap">
    <div class="gallery" id="gallery"></div>
</main>

<div class="modal-overlay" id="modalOverlay" onclick="fecharModal(event)">
    <div class="modal-box">
        <button class="modal-close" onclick="fecharModal(null, true)">✕</button>
        <div class="modal-carousel">
            <div class="modal-track" id="modalTrack"></div>
            <button class="carousel-btn prev" onclick="mudarSlideModal(-1, true)">&#8249;</button>
            <button class="carousel-btn next" onclick="mudarSlideModal(1, true)">&#8250;</button>
        </div>
        <div class="modal-info" id="modalInfo"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "...",
        authDomain: "moto-aires-catalogo.firebaseapp.com",
        projectId: "moto-aires-catalogo",
        storageBucket: "moto-aires-catalogo.firebasestorage.app",
        messagingSenderId: "...",
        appId: "..."
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    let produtos = [];
    let categoriaAtiva = 'todos';
    let carrosselIdx = 0;
    let fotosTemporarias = [];
    
    function carregarFotosPainel(files) {
        fotosTemporarias = [];
        let carregadas = 0;
        Array.from(files).forEach((file, index) => {
            const reader = new FileReader();
            reader.onload = e => {
                fotosTemporarias.push(e.target.result);
                carregadas++;
                if (carregadas === files.length) {
                    renderizarGerenciadorCapa();
                }
            };
            reader.readAsDataURL(file);
        });
    }

    function renderizarGerenciadorCapa() {
        const container = document.getElementById('previewThumbsContainer');
        const painel = document.getElementById('previewManagement');
        
        if(fotosTemporarias.length === 0) {
            painel.style.display = 'none';
            return;
        }
        
        painel.style.display = 'block';
        container.innerHTML = fotosTemporarias.map((foto, idx) => `
            <div class="thumb-manage-item ${idx === 0 ? 'is-cover' : ''}" onclick="definirComoCapa(${idx})">
                <img src="${foto}">
            </div>
        `).join('');
    }

    function definirComoCapa(idx) {
        const fotoSelecionada = fotosTemporarias.splice(idx, 1)[0];
        fotosTemporarias.unshift(fotoSelecionada);
        renderizarGerenciadorCapa();
    }

    async function salvarProduto() {
        const nome = document.getElementById('prodName').value;
        const categoria = document.getElementById('prodCategory').value;
        const ano = document.getElementById('prodAno').value;
        const modelo = document.getElementById('prodModelo').value;
        const km = document.getElementById('prodKm').value;
        const preco = document.getElementById('prodPreco').value;

        if (!nome || fotosTemporarias.length === 0) {
            alert("Por favor, digite o nome e adicione pelo menos uma foto!");
            return;
        }

        const novoProduto = {
            nome: nome,
            categoria: categoria,
            ano: ano,
            modelo: modelo,
            km: km,
            preco: preco,
            imagens: [...fotosTemporarias],
            dataCriacao: new Date().toISOString()
        };

        try {
            await db.collection("produtos").add(novoProduto);
            alert("Sucesso! Produto salvo e publicado no catálogo!");
            
            document.getElementById('prodName').value = '';
            document.getElementById('prodAno').value = '';
            document.getElementById('prodModelo').value = '';
            document.getElementById('prodKm').value = '';
            document.getElementById('prodPreco').value = '';
            fotosTemporarias = [];
            document.getElementById('previewManagement').style.display = 'none';
        } catch (error) {
            produtos.push({ id: Date.now().toString(), ...novoProduto });
            renderizar();
            atualizarCarrossel();
            atualizarImagensCategoriasDoTopo();
            
            document.getElementById('prodName').value = '';
            document.getElementById('prodAno').value = '';
            document.getElementById('prodModelo').value = '';
            document.getElementById('prodKm').value = '';
            document.getElementById('prodPreco').value = '';
            fotosTemporarias = [];
            document.getElementById('previewManagement').style.display = 'none';
        }
    }

    function buscarProdutosSalvos() {
        db.collection("produtos").orderBy("dataCriacao", "desc").onSnapshot((snapshot) => {
            produtos = [];
            snapshot.forEach((doc) => {
                produtos.push({ id: doc.id, ...doc.data() });
            });
            renderizar();
            atualizarCarrossel();
            atualizarImagensCategoriasDoTopo();
        }, (error) => {
            console.log("Modo offline ativo.");
        });
    }

    window.onload = function() {
        buscarProdutosSalvos();
    };

    async function removerProduto(id, event) {
        event.stopPropagation();
        if(confirm("Tem certeza que deseja remover este item?")) {
            try {
                await db.collection("produtos").doc(id).delete();
                alert("Item removido com sucesso!");
            } catch (error) {
                produtos = produtos.filter(p => p.id !== id);
                renderizar();
                atualizarCarrossel();
                atualizarImagensCategoriasDoTopo();
            }
        }
    }

    function atualizarImagensCategoriasDoTopo() {
        const categorias = ['motos', 'quadriciclos', 'pecas', 'acessorios'];
        categorias.forEach(cat => {
            const imgElemento = document.getElementById(`img-capa-${cat}`);
            if (!imgElemento) return;
            const ultimoItem = produtos.find(p => p.categoria === cat);
            if (ultimoItem && ultimoItem.imagens && ultimoItem.imagens[0]) {
                imgElemento.src = ultimoItem.imagens[0];
            } else {
                imgElemento.src = 'img/augusta.jpg';
            }
        });
    }

    function abrirCategoria(categoria) {
        categoriaAtiva = categoria;
        carrosselIdx = 0;
        
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        const botaoAlvo = document.getElementById(`tab-${categoria}`);
        if(botaoAlvo) botaoAlvo.classList.add('active');

        renderizar();
        atualizarCarrossel();
    }

    function filterCategory(cat, btn) {
        categoriaAtiva = cat;
        carrosselIdx = 0;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderizar();
        atualizarCarrossel();
    }

    function atualizarCarrossel() {
        const track = document.getElementById('carouselTrack');
        const lista = categoriaAtiva === 'todos' ? produtos : produtos.filter(p => p.categoria === categoriaAtiva);
        
        if (lista.length === 0) {
            track.innerHTML = '<div class="carousel-slide"><div style="padding:100px; text-align:center">Nenhum item em destaque</div></div>';
            return;
        }

        track.innerHTML = lista.map(p => `
            <div class="carousel-slide" onclick="abrirModal('${p.id}')">
                <img src="${p.imagens[0]}">
                <div class="carousel-slide-info">
                    <div class="carousel-slide-name">${p.nome} ${p.ano ? ' | ' + p.ano : ''}</div>
                </div>
            </div>`).join('');
        
        if (carrosselIdx >= lista.length) carrosselIdx = 0;
        track.style.transform = `translateX(-${carrosselIdx * 100}%)`;
    }

    function moverCarrossel(dir) {
        const lista = categoriaAtiva === 'todos' ? produtos : produtos.filter(p => p.categoria === categoriaAtiva);
        if (lista.length === 0) return;
        carrosselIdx = (carrosselIdx + dir + lista.length) % lista.length;
        atualizarCarrossel();
    }

    function renderizar() {
        const gallery = document.getElementById('gallery');
        const lista = categoriaAtiva === 'todos' ? produtos : produtos.filter(p => p.categoria === categoriaAtiva);
        
        if (lista.length === 0) {
            gallery.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:40px; color:var(--muted);">Nenhum veículo cadastrado nesta categoria.</div>';
            return;
        }

        gallery.innerHTML = lista.map(p => `
            <div class="product-card" onclick="abrirModal('${p.id}')">
                <button class="delete-btn" onclick="removerProduto('${p.id}', event)" title="Remover Produto">🗑️</button>
                <div class="card-img-wrap">
                    <img src="${p.imagens[0]}">
                    ${p.imagens.length > 1 ? `<div class="card-img-count">+${p.imagens.length} fotos</div>` : ''}
                </div>
                <div class="card-body">
                    <div class="card-title">${p.nome}</div>
                    <div class="card-specs">
                        ${p.ano ? `<span class="spec-pill">Ano: ${p.ano}</span>` : ''}
                        ${p.km ? `<span class="spec-pill">${p.km} KM</span>` : ''}
                    </div>
                    <div class="card-price">R$ ${p.preco}</div>
                </div>
            </div>`).join('');
    }

    let modalIdx = 0;
    function abrirModal(id) {
        const p = produtos.find(item => item.id === id);
        if (!p) return;
        modalIdx = 0;
        
        document.getElementById('modalTrack').innerHTML = p.imagens.map(img => `
            <div class="modal-slide"><img src="${img}"></div>`).join('');
            
        document.getElementById('modalInfo').innerHTML = `
            <h2 style="font-family:Bebas Neue; font-size:40px">${p.nome}</h2>
            <p style="color:var(--orange); font-size:20px; margin-bottom:15px">R$ ${p.preco}</p>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                <div class="spec-pill">Ano: ${p.ano}</div>
                <div class="spec-pill">Modelo: ${p.modelo}</div>
                <div class="spec-pill">KM: ${p.km}</div>
                <div class="spec-pill">Categoria: ${p.categoria}</div>
            </div>
            <a href="https://wa.me/5531999999999?text=Olá,%20tenho%20interesse%20na%20${encodeURIComponent(p.nome)}" target="_blank" style="display:block; background:#1DB954; color:white; text-align:center; padding:15px; border-radius:10px; text-decoration:none; margin-top:20px; font-weight:bold">Tenho Interesse</a>
        `;
        document.getElementById('modalOverlay').classList.add('open');
        mudarSlideModal(0);
    }

    function mudarSlideModal(dir, relativo = false) {
        const track = document.getElementById('modalTrack');
        const slides = track.children.length;
        if (slides === 0) return;
        if (relativo) modalIdx = (modalIdx + dir + slides) % slides;
        else modalIdx = dir;
        track.style.transform = `translateX(-${modalIdx * 100}%)`;
    }

    function fecharModal(e, forcar = false) {
        if (forcar || e.target.id === 'modalOverlay') {
            document.getElementById('modalOverlay').classList.remove('open');
        }
    }
</script>
</body>
</html>
