<!DOCTYPE html>
<html lang="pt-BR">
<head>   
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTO AIRES & DUARTE PEÇAS — Catálogo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0D0D0D;
            --surface: #161616;
            --card: #1A1A1A;
            --border: #2A2A2A;
            --orange: #FF5500;
            --orange-dim: #CC4400;
            --text: #F0F0F0;
            --muted: #777;
            --silver: #A0A0A0;
            --danger: #FF3333;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

        /* ─── HERO ─── */
        .hero { position: relative; overflow: hidden; padding: 60px 40px 50px; border-bottom: 1px solid var(--border); }
        .hero-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; color: var(--orange); margin-bottom: 14px; }
        .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(64px, 10vw, 130px); line-height: 0.92; letter-spacing: 2px; }
        .hero-title span { color: var(--orange); }

        /* ─── ADMIN PANEL ─── */
        .admin-panel { margin: 30px 40px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px 28px; }
        .admin-title { font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--orange); margin-bottom: 18px; }
        .admin-fields { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
        .admin-field-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 140px; }
        .admin-field-group label { font-size: 11px; color: var(--muted); text-transform: uppercase; }
        .admin-fields input, .admin-fields select { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 11px 16px; border-radius: 8px; outline: none; width: 100%; }
        .upload-btn { background: var(--orange); color: white; border: none; padding: 11px 22px; border-radius: 8px; font-weight: 600; cursor: pointer; height: 44px; align-self: flex-end; }
        #fileInput { display: none; }

        /* GERENCIADOR DE CAPA NO PAINEL */
        .preview-management { width: 100%; margin-top: 15px; display: none; background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .preview-management p { font-size: 12px; color: var(--silver); margin-bottom: 10px; }
        .preview-thumbs-container { display: flex; gap: 10px; flex-wrap: wrap; }
        .thumb-manage-item { width: 80px; height: 60px; position: relative; border-radius: 6px; overflow: hidden; cursor: pointer; border: 2px solid transparent; }
        .thumb-manage-item img { width: 100%; height: 100%; object-fit: cover; }
        .thumb-manage-item.is-cover { border-color: var(--orange); }
        .thumb-manage-item.is-cover::after { content: "CAPA"; position: absolute; bottom: 0; left: 0; right: 0; background: var(--orange); color: white; font-size: 9px; font-weight: bold; text-align: center; padding: 1px 0; }

        /* ─── CARROSSEL BANNER ─── */
        .carousel-section { position: relative; overflow: hidden; height: 350px; background: #111; border-bottom: 1px solid var(--border); }
        .carousel-track { display: flex; height: 100%; transition: transform 0.5s cubic-bezier(.77,0,.175,1); }
        .carousel-slide { min-width: 100%; height: 100%; position: relative; flex-shrink: 0; cursor: pointer; }
        .carousel-slide img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .carousel-slide-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 40px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); }
        .carousel-slide-name { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 2px; }
        .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: white; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; z-index: 10; }
        .carousel-btn.prev { left: 20px; }
        .carousel-btn.next { right: 20px; }

        /* ─── TABS ─── */
        .tabs-wrap { padding: 24px 40px 0; display: flex; gap: 8px; flex-wrap: wrap; }
        .tab-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 10px 24px; border-radius: 40px; cursor: pointer; font-weight: 500; transition: 0.2s; }
        .tab-btn.active { background: var(--orange); border-color: var(--orange); color: white; }

        /* ─── GALLERY ─── */
        .gallery-wrap { padding: 30px 40px 60px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

        /* ─── PRODUCT CARD ─── */
        .product-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.2s; position: relative; }
        .product-card:hover { transform: translateY(-5px); border-color: var(--orange); }
        .card-img-wrap { height: 220px; position: relative; background: #000; }
        .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .card-img-count { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; font-size: 11px; padding: 4px 8px; border-radius: 4px; }
        
        /* BOTÃO REMOVER */
        .delete-btn { position: absolute; top: 10px; right: 10px; background: rgba(0, 0, 0, 0.75); border: 1px solid rgba(255,255,255,0.1); color: var(--danger); width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 50; transition: 0.2s; font-size: 16px; }
        .delete-btn:hover { background: var(--danger); color: white; }

        .card-body { padding: 20px; }
        .card-title { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
        .card-specs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
        .spec-pill { background: var(--surface); border: 1px solid var(--border); padding: 4px 10px; border-radius: 6px; font-size: 12px; color: var(--silver); }
        .card-price { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--orange); }

        /* ─── MODAL ─── */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-overlay.open { display: flex; }
        .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; width: 90%; max-width: 900px; max-height: 90vh; overflow-y: auto; position: relative; }
        .modal-carousel { position: relative; background: #000; height: 450px; }
        .modal-track { display: flex; height: 100%; transition: 0.4s ease; }
        .modal-slide { min-width: 100%; height: 100%; }
        .modal-slide img { width: 100%; height: 100%; object-fit: contain; }
        .modal-info { padding: 30px; }
        .modal-close { position: absolute; top: 20px; right: 20px; background: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; z-index: 100; font-weight: bold; color: black; display: flex; align-items: center; justify-content: center; }

        @media (max-width: 600px) {
            .hero, .admin-panel, .tabs-wrap, .gallery-wrap { padding: 20px; margin: 10px; }
            .carousel-section, .modal-carousel { height: 250px; }
        }
    </style>
<header class="hero" style="
    position: relative; 
    overflow: hidden; 
    padding: 100px 40px 60px; 
    border-bottom: 1px solid var(--border);
    background-image: linear-gradient(rgba(11, 11, 11, 0.25), rgba(13, 13, 13, 0.75)), url('img/augusta.jpg');
    background-size: cover;
    background-position: center center;
">
    <div class="hero-eyebrow">⚡ Catálogo Interativo</div>
    <h1 class="hero-title">MOTO AIRES E <span>DUARTE PEÇAS</span></h1>
    <h3 style="font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 4px; color: var(--silver); margin-top: 20px;">
        AS PEÇAS QUE VCS NÃO ENCONTRAM NEM NA CHINA.....VCS AGORA ESTÃO NO LUGAR CERTO!!!
    </h3>
</header>
<section class="hero-slider">
    <div class="slider-track">

        <div class="slide" onclick="abrirCategoria('Motos')">
            <img src="img/augusta.jpg" alt="Motos" style="width: 100%; height: 100%; object-fit: cover;">
            <div class="slide-caption">MOTOS</div>
        </div>

        <div class="slide" onclick="abrirCategoria('Quadriciclos')">
            <img src="img/augusta.jpg" alt="Quadriciclos" style="width: 100%; height: 100%; object-fit: cover;">
            <div class="slide-caption">QUADRICICLOS</div>
        </div>

        <div class="slide" onclick="abrirCategoria('Peças')">
            <img src="img/augusta.jpg" alt="Peças" style="width: 100%; height: 100%; object-fit: cover;">
            <div class="slide-caption">PEÇAS</div>
        </div>

        <div class="slide" onclick="abrirCategoria('Acessórios')">
            <img src="img/augusta.jpg" alt="Acessórios" style="width: 100%; height: 100%; object-fit: cover;">
            <div class="slide-caption">ACESSÓRIOS</div>
        </div>

    </div>
</section>
<section class="admin-panel">
    <div class="admin-title">▸ Adicionar Novo Item</div>
    <div class="admin-fields">
        <div class="admin-field-group" style="flex:2;">
            <label>Nome da Moto / Item</label>
            <input type="text" id="prodName" placeholder="Ex: Honda CB 500X">
        </div>
        <div class="admin-field-group">
            <label>Categoria</label>
            <select id="prodCategory">
                <option value="motos">Motos</option>
                <option value="pecas">Peças</option>
                <option value="quadriciclos">Quadriciclos</option>
            </select>
        </div>
        <div class="admin-field-group">
            <label>Ano</label>
            <input type="text" id="prodAno" placeholder="2023">
        </div>
        <div class="admin-field-group">
            <label>Modelo</label>
            <input type="text" id="prodModelo" placeholder="ABS">
        </div>
        <div class="admin-field-group">
            <label>KM</label>
            <input type="text" id="prodKm" placeholder="5.000">
        </div>
        <div class="admin-field-group">
            <label>Preço (R$)</label>
            <input type="text" id="prodPreco" placeholder="45.000">
        </div>
        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">Selecionar Fotos</button>
        <input type="file" id="fileInput" accept="image/*" multiple onchange="carregarFotosPainel(this.files)">
    </div>
</section>

    <div class="preview-management" id="previewManagement">
        <p>💡 Clique em uma das imagens abaixo para defini-la como a <strong>Foto de Capa</strong> principal:</p>
        <div class="preview-thumbs-container" id="previewThumbsContainer"></div>
        <button class="upload-btn" style="margin-top: 15px; height: 38px; padding: 0 15px; background: #1DB954;" onclick="salvarProduto()">Concluir e Salvar Item</button>
    </div>
</section>

<div class="carousel-section">
    <div id="carouselTrack" class="carousel-track"></div>
    <button class="carousel-btn prev" onclick="moverCarrossel(-1)">&#8249;</button>
    <button class="carousel-btn next" onclick="moverCarrossel(1)">&#8250;</button>
</div>

<nav class="tabs-wrap">
    <button class="tab-btn active" onclick="filterCategory('todos', this)">Todos</button>
    <button class="tab-btn" onclick="filterCategory('motos', this)">Motos</button>
    <button class="tab-btn" onclick="filterCategory('pecas', this)">Peças</button>
    <button class="tab-btn" onclick="filterCategory('quadriciclos', this)">Quadriciclos</button>
</nav>

<main class="gallery-wrap">
    <div class="gallery" id="gallery"></div>
</main>

<div class="modal-overlay" id="modalOverlay" onclick="fecharModal(event)">
    <div class="modal-box">
        <button class="modal-close" onclick="fecharModal(null, true)">✕</button>
        <div class="modal-carousel">
            <div class="modal-track" id="modalTrack"></div>
            <button class="carousel-btn prev" onclick="mudarSlideModal(-1, true)">&#8249;</button>
            <button class="carousel-btn next" onclick="mudarSlideModal(1, true)">&#8250;</button>
        </div>
        <div class="modal-info" id="modalInfo"></div>
    </div>
</div>

<script>
        const firebaseConfig = {
    apiKey: "...",
    authDomain: "moto-aires-catalogo.firebaseapp.com",
    projectId: "moto-aires-catalogo",
    storageBucket: "moto-aires-catalogo.firebasestorage.app",
    messagingSenderId: "...",
    appId: "..."
    };
    let produtos = [];
    let categoriaAtiva = 'todos';
    let carrosselIdx = 0;
    
    let fotosTemporarias = [];

    function carregarFotosPainel(files) {
        fotosTemporarias = [];
        let carregadas = 0;
        
        Array.from(files).forEach((file, index) => {
            const reader = new FileReader();
            reader.onload = e => {
                fotosTemporarias.push(e.target.result);
                carregadas++;
                if (carregadas === files.length) {
                    renderizarGerenciadorCapa();
                }
            };
            reader.readAsDataURL(file);
        });
    }
    function abrirCategoria(categoria){

    categoriaSelecionada = categoria;

    renderizar();

    document.querySelector(".catalogo")
        ?.scrollIntoView({
            behavior:'smooth'
        });
    }


    
    function abrirProduto(id){

    const produto =
        produtos.find(p => p.id == id);

    abrirModal(produto);

    }

    function renderizarGerenciadorCapa() {
        const container = document.getElementById('previewThumbsContainer');
        const painel = document.getElementById('previewManagement');
        
        if(fotosTemporarias.length === 0) {
            painel.style.display = 'none';
            return;
        }
        
        painel.style.display = 'block';
        container.innerHTML = fotosTemporarias.map((foto, idx) => `
            <div class="thumb-manage-item ${idx === 0 ? 'is-cover' : ''}" onclick="definirComoCapa(${idx})">
                <img src="${foto}">
            </div>
        `).join('');
    }

    // FUNÇÃO QUE SALVA O PRODUTO DEFINITIVAMENTE NO FIREBASE
    async function salvarProduto() {
        const nome = document.getElementById('prodName').value;
        const categoria = document.getElementById('prodCategory').value;
        const ano = document.getElementById('prodAno').value;
        const modelo = document.getElementById('prodModelo').value;
        const km = document.getElementById('prodKm').value;
        const preco = document.getElementById('prodPreco').value;

        if (!nome || fotosTemporarias.length === 0) {
            alert("Por favor, digite o nome e adicione pelo menos uma foto!");
            return;
        }

        const novoProduto = {
            nome: nome,
            categoria: categoria,
            ano: ano,
            modelo: modelo,
            km: km,
            preco: preco,
            imagens: fotosTemporarias, // Aqui salvamos as fotos convertidas
            dataCriacao: new Date().toISOString()
        };

        try {
            // Envia direto para a coleção 'produtos' do seu Firebase
            await db.collection("produtos").add(novoProduto);
            alert("Sucesso! Produto salvo e publicado no catálogo!");
            
            // Limpa os campos para o próximo cadastro
            document.getElementById('prodName').value = '';
            fotosTemporarias = [];
        } catch (error) {
            console.error("Erro ao salvar no Firebase: ", error);
            alert("Erro ao salvar. Verifique a conexão com o banco de dados.");
        }
    }

    // FUNÇÃO QUE BUSCA AS FOTOS SALVAS NO BANCO QUANDO O SITE ABRE
    function buscarProdutosSalvos() {
        db.collection("produtos").orderBy("dataCriacao", "desc").onSnapshot((snapshot) => {
            produtos = [];
            snapshot.forEach((doc) => {
                produtos.push({ id: doc.id, ...doc.data() });
            });
            renderizar(); // Atualiza a tela com as motos salvas de verdade
        });
    }

    // Executa a busca assim que o site carrega na tela
    window.onload = function() {
        buscarProdutosSalvos();
    };






    function definirComoCapa(idx) {
        const fotoSelecionada = fotosTemporarias.splice(idx, 1)[0];
        fotosTemporarias.unshift(fotoSelecionada);
        renderizarGerenciadorCapa();
    }

    function salvarProduto() {
        if(fotosTemporarias.length === 0) {
            alert("Por favor, selecione ao menos uma foto antes de salvar.");
            return;
        }

        const dados = {
            id: Date.now(),
            nome: document.getElementById('prodName').value || "Sem nome",
            categoria: document.getElementById('prodCategory').value,
            ano: document.getElementById('prodAno').value,
            modelo: document.getElementById('prodModelo').value,
            km: document.getElementById('prodKm').value,
            preco: document.getElementById('prodPreco').value,
            imagens: [...fotosTemporarias]
        };

        produtos.push(dados);
        
        document.getElementById('prodName').value = '';
        document.getElementById('prodAno').value = '';
        document.getElementById('prodModelo').value = '';
        document.getElementById('prodKm').value = '';
        document.getElementById('prodPreco').value = '';
        fotosTemporarias = [];
        document.getElementById('previewManagement').style.display = 'none';

        renderizar();
        atualizarCarrossel();
    }

    function removerProduto(id, event) {
        event.stopPropagation();
        if(confirm("Tem certeza que deseja remover este item?")) {
            produtos = produtos.filter(p => p.id !== id);
            renderizar();
            atualizarCarrossel();
        }
    }

    function atualizarCarrossel() {
        const track = document.getElementById('carouselTrack');
        const lista = categoriaAtiva === 'todos' ? produtos : produtos.filter(p => p.categoria === categoriaAtiva);
        
        if (lista.length === 0) {
            track.innerHTML = '<div class="carousel-slide"><div style="padding:100px; text-align:center">Nenhum item em destaque</div></div>';
            return;
        }

        track.innerHTML = lista.map(p => `
            <div class="carousel-slide" onclick="abrirModal(${p.id})">
                <img src="${p.imagens[0]}">
                <div class="carousel-slide-info">
                    <div class="carousel-slide-name">${p.nome} ${p.ano ? ' | ' + p.ano : ''}</div>
                </div>
            </div>`).join('');
        track.style.transform = `translateX(-${carrosselIdx * 100}%)`;
    }

    function moverCarrossel(dir) {
        const lista = categoriaAtiva === 'todos' ? produtos : produtos.filter(p => p.categoria === categoriaAtiva);
        if (lista.length === 0) return;
        carrosselIdx = (carrosselIdx + dir + lista.length) % lista.length;
        atualizarCarrossel();
    }

    function renderizar() {
        const gallery = document.getElementById('gallery');
        const lista = categoriaAtiva === 'todos' ? produtos : produtos.filter(p => p.categoria === categoriaAtiva);
        
        if (lista.length === 0) {
            gallery.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:40px; color:var(--muted);">Nenhum veículo cadastrado nesta categoria.</div>';
            return;
        }

        gallery.innerHTML = lista.map(p => `
            <div class="product-card" onclick="abrirModal(${p.id})">
                <button class="delete-btn" onclick="removerProduto(${p.id}, event)" title="Remover Produto">🗑️</button>
                <div class="card-img-wrap">
                    <img src="${p.imagens[0]}">
                    ${p.imagens.length > 1 ? `<div class="card-img-count">+${p.imagens.length} fotos</div>` : ''}
                </div>
                <div class="card-body">
                    <div class="card-title">${p.nome}</div>
                    <div class="card-specs">
                        ${p.ano ? `<span class="spec-pill">Ano: ${p.ano}</span>` : ''}
                        ${p.km ? `<span class="spec-pill">${p.km} KM</span>` : ''}
                    </div>
                    <div class="card-price">R$ ${p.preco}</div>
                </div>
            </div>`).join('');
    }

    function filterCategory(cat, btn) {
        categoriaAtiva = cat;
        carrosselIdx = 0;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderizar();
        atualizarCarrossel();
    }

    let modalIdx = 0;
    function abrirModal(id) {
        const p = produtos.find(item => item.id === id);
        if (!p) return;
        modalIdx = 0;
        
        document.getElementById('modalTrack').innerHTML = p.imagens.map(img => `
            <div class="modal-slide"><img src="${img}"></div>`).join('');
        
        document.getElementById('modalInfo').innerHTML = `
            <h2 style="font-family:Bebas Neue; font-size:40px">${p.nome}</h2>
            <p style="color:var(--orange); font-size:20px; margin-bottom:15px">R$ ${p.preco}</p>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                <div class="spec-pill">Ano: ${p.ano}</div>
                <div class="spec-pill">Modelo: ${p.modelo}</div>
                <div class="spec-pill">KM: ${p.km}</div>
                <div class="spec-pill">Categoria: ${p.categoria}</div>
            </div>
            <a href="#" style="display:block; background:#1DB954; color:white; text-align:center; padding:15px; border-radius:10px; text-decoration:none; margin-top:20px; font-weight:bold">Tenho Interesse</a>
        `;
        
        document.getElementById('modalOverlay').classList.add('open');
        mudarSlideModal(0);
    }

    function mudarSlideModal(dir, relativo = false) {
        const track = document.getElementById('modalTrack');
        const slides = track.children.length;
        if (slides === 0) return;
        if (relativo) modalIdx = (modalIdx + dir + slides) % slides;
        else modalIdx = dir;
        track.style.transform = `translateX(-${modalIdx * 100}%)`;
    }

    function fecharModal(e, forcar = false) {
        if (forcar || e.target.id === 'modalOverlay') {
            document.getElementById('modalOverlay').classList.remove('open');
        }
    }
</script>
</body>
</html>
